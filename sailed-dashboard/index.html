<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Redirecting to Silo Dashboard</title>
  <meta http-equiv="refresh" content="0; url=/silo/app/">
  <link rel="canonical" href="/silo/app/">
  <script>
    (function () {
      var target = '/silo/app/';
      try {
        window.location.replace(target);
      } catch (_) {
        window.location.href = target;
      }
    })();
  </script>
</head>
<body>
  <p>Redirecting to the <a href="/silo/app/">Silo Dashboard</a>…</p>
</body>
</html>
